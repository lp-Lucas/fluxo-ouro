# Proxy do studio sob o dominio do OS. Docs: AGENTE-VIDEO-SERVICE.md secoes 2 e 8.
# Vai DENTRO do server{} de app.blueoceanos.com, no nginx da KVM8.
#
# Decisao travada: o studio abre DENTRO do OS, mesmo dominio e mesma sessao. Proibido
# mandar o usuario pra outro link/site. Por isso e' path, nao subdominio.

location /agente-video/studio/ {
    # ============================================================================
    # A LINHA MAIS IMPORTANTE DESTE ARQUIVO
    # ============================================================================
    # Sem isto, o navegador manda o COOKIE DE SESSAO DO OS pro fluxo-ouro-service —
    # a credencial do painel dos 220 clientes iria parar num servico que executa
    # ffmpeg e codigo de IA. O servico NAO precisa e NAO pode ver essa sessao.
    # Quem autentica o usuario aqui e' o token curto e assinado (?t=), emitido pelo
    # OS em lib/video/studio-token.ts e validado em src/os-integration/auth.ts.
    proxy_set_header Cookie "";
    # ============================================================================

    proxy_pass http://127.0.0.1:3002/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Upload de video bruto: o default (1m) recusaria qualquer arquivo real.
    client_max_body_size 2g;
    # Render e' longo; o default (60s) mataria a conexao no meio.
    proxy_read_timeout    1800s;
    proxy_send_timeout    1800s;
    proxy_request_buffering off;

    # O studio nao e' proxiado pra fora: so este path chega nele.
    # (o /jobs do plano de controle NAO passa por aqui — o OS fala direto no 127.0.0.1)
}

# NAO exponha /jobs pela internet. O plano de controle e' loopback:
#   OS (mesmo host) -> http://127.0.0.1:3002/jobs  com Bearer VIDEO_SERVICE_TOKEN.
# Se um dia precisar de outro host, use rede privada + mTLS — nunca porta publica.
