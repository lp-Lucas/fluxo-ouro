<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotionIA — Viewer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #080808;
      --panel:   #0f0f0f;
      --border:  #1c1c1c;
      --input:   #0c0c0c;
      --accent:  #0033ff;
      --text:    #e2e2e2;
      --muted:   #3a3a3a;
      --label:   #2a2a2a;
      --green:   #1db954;
      --red:     #ff4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--panel);
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      white-space: nowrap;
    }

    .logo span { color: var(--accent); }

    .folder-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .folder-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .folder-input {
      flex: 1;
      min-width: 0;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      padding: 6px 10px;
      font-family: 'Cascadia Code', 'SF Mono', 'Consolas', monospace;
      transition: border-color 0.15s;
    }
    .folder-input:focus { outline: none; border-color: var(--accent); }

    .btn {
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: #333; color: var(--text); opacity: 1; }

    .video-count {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── MAIN 3-COL GRID ─────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 210px 1fr 380px;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

    .sidebar-head {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--label);
      padding: 14px 14px 8px;
      flex-shrink: 0;
    }

    .video-item {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
    }
    .video-item:hover { background: #111; }
    .video-item.active {
      background: #111;
      border-left-color: var(--accent);
    }
    .video-item .name {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .video-item.active .name { color: #fff; }
    .video-item .meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .empty-msg {
      padding: 20px 14px;
      font-size: 12px;
      color: var(--label);
      line-height: 1.7;
    }
    .empty-msg.err { color: var(--red); }

    /* ── CENTER: PHONE AREA ──────────────────── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 32px;
      gap: 18px;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid background */
    .center::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
    }

    /* ── PHONE MOCKUP ────────────────────────── */
    .phone-outer {
      background: linear-gradient(160deg, #1e1e1e 0%, #0a0a0a 100%);
      border-radius: 44px;
      padding: 14px;
      box-shadow:
        0 0 0 1px #2a2a2a,
        0 0 0 3px #0d0d0d,
        0 60px 140px rgba(0,0,0,0.95),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    /* Volume buttons left */
    .phone-outer::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 88px;
      width: 4px;
      border-radius: 2px 0 0 2px;
      height: 30px;
      background: #1c1c1c;
      box-shadow: 0 44px 0 #1c1c1c;
    }

    /* Power button right */
    .phone-outer::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 108px;
      width: 4px;
      border-radius: 0 2px 2px 0;
      height: 56px;
      background: #1c1c1c;
    }

    .phone-screen {
      background: #000;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      width: 288px;
      aspect-ratio: 9 / 16;
    }

    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 84px;
      height: 22px;
      background: #000;
      border-radius: 20px;
      z-index: 20;
      border: 2px solid #0d0d0d;
      pointer-events: none;
    }

    #phoneVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .phone-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #1e1e1e;
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    .placeholder-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #222;
    }

    /* Progress bar overlay */
    .progress-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.06);
      z-index: 15;
      pointer-events: none;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.25s linear;
    }

    /* ── CONTROLS BELOW PHONE ────────────────── */
    .video-name-tag {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .nav-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      padding: 7px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.12s;
    }
    .nav-btn:hover:not(:disabled) { border-color: #333; color: var(--text); }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .play-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.12s, transform 0.1s;
    }
    .play-btn:hover { opacity: 0.85; }
    .play-btn:active { transform: scale(0.93); }

    .nav-index {
      font-size: 11px;
      color: var(--muted);
      min-width: 44px;
      text-align: center;
    }

    /* ── RIGHT INFO PANEL ────────────────────── */
    .info-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel);
    }

    .info-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .info-scroll::-webkit-scrollbar { width: 3px; }
    .info-scroll::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

    .field-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--label);
      margin-bottom: 7px;
    }

    .field-input,
    .field-textarea {
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      padding: 9px 11px;
      width: 100%;
      line-height: 1.55;
      transition: border-color 0.15s;
      resize: none;
    }
    .field-input:focus,
    .field-textarea:focus { outline: none; border-color: #2a2a2a; }

    .field-textarea.prompt {
      min-height: 180px;
      font-family: 'Cascadia Code', 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      line-height: 1.6;
    }

    .field-textarea.notes { min-height: 120px; }

    .char-count {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      margin-top: 4px;
    }
    .char-count.warn { color: #e8a020; }

    /* ── SAVE BAR ────────────────────────────── */
    .save-bar {
      padding: 11px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }

    .save-status {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .save-status.saved  { color: var(--green); }
    .save-status.dirty  { color: #666; }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block;
    }

    .btn-save {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-save:not(:disabled):hover { border-color: #333; color: var(--text); }
    .btn-save:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-save.ok { border-color: var(--green); color: var(--green); }

    /* ── KEYBOARD HINT ───────────────────────── */
    .kbd-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--label);
      display: flex;
      gap: 10px;
      z-index: 1;
      white-space: nowrap;
    }
    .kbd-hint span { display: flex; align-items: center; gap: 4px; }
    .kbd {
      display: inline-block;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 9px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Motion<span>IA</span> <span style="color:var(--muted);font-weight:400">Viewer</span></div>
  <div class="folder-row">
    <span class="folder-label">Pasta:</span>
    <input
      type="text"
      class="folder-input"
      id="folderInput"
      placeholder="C:\Users\Lucas\Desktop\MotionIA\videos"
      onkeydown="if(event.key==='Enter') scanFolder()"
    >
    <button class="btn btn-primary" onclick="scanFolder()">Escanear</button>
  </div>
  <div class="video-count" id="videoCount"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">Vídeos</div>
    <div id="videoList">
      <div class="empty-msg">Selecione uma pasta<br>e clique em Escanear</div>
    </div>
  </div>

  <!-- CENTER: PHONE -->
  <div class="center" id="centerArea">

    <div class="phone-outer">
      <div class="phone-screen" id="phoneScreen">
        <div class="dynamic-island"></div>

        <div class="phone-placeholder" id="phonePlaceholder">
          <div class="placeholder-icon">▶</div>
          <div>Selecione um vídeo</div>
        </div>

        <video id="phoneVideo" playsinline loop style="display:none"></video>

        <div class="progress-overlay">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <div class="video-name-tag" id="videoNameTag">—</div>

    <div class="controls">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>←</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)"  disabled>→</button>
      <span class="nav-index" id="navIndex"></span>
    </div>

    <div class="kbd-hint">
      <span><span class="kbd">←</span><span class="kbd">→</span> navegar</span>
      <span><span class="kbd">Space</span> play/pause</span>
    </div>
  </div>

  <!-- RIGHT INFO PANEL -->
  <div class="info-panel">
    <div class="info-scroll">

      <div>
        <div class="field-label">Modelo / Ferramenta</div>
        <input
          type="text"
          class="field-input"
          id="fieldModel"
          placeholder="ex: Seedance · Higgsfield · Kling · Sora · Veo"
          oninput="markDirty()"
        >
      </div>

      <div>
        <div class="field-label">Prompt</div>
        <textarea
          class="field-textarea prompt"
          id="fieldPrompt"
          placeholder="Prompt usado para gerar este vídeo..."
          oninput="markDirty(); updateCharCount()"
        ></textarea>
        <div class="char-count" id="charCount">0 chars</div>
      </div>

      <div>
        <div class="field-label">Notas</div>
        <textarea
          class="field-textarea notes"
          id="fieldNotes"
          placeholder="Observações, ajustes a fazer, variações testadas, resultado..."
          oninput="markDirty()"
        ></textarea>
      </div>

    </div>

    <div class="save-bar">
      <div class="save-status" id="saveStatus">
        <span class="dot"></span>
        <span id="saveMsg">Nenhum vídeo</span>
      </div>
      <button class="btn-save" id="saveBtn" onclick="saveNotes()" disabled>Salvar</button>
    </div>
  </div>

</div>

<script>
  let videos       = [];
  let currentIndex = -1;
  let currentFolder= '';
  let isDirty      = false;
  let autoSaveTimer= null;

  const videoEl   = document.getElementById('phoneVideo');
  const placeholder = document.getElementById('phonePlaceholder');
  const progressFill = document.getElementById('progressFill');

  // Restore last folder
  const saved = localStorage.getItem('motionIA_viewer_folder');
  if (saved) {
    document.getElementById('folderInput').value = saved;
    scanFolder();
  }

  // ── Video progress bar
  videoEl.addEventListener('timeupdate', () => {
    if (!videoEl.duration) return;
    progressFill.style.width = (videoEl.currentTime / videoEl.duration * 100) + '%';
  });

  // ── Scan folder
  async function scanFolder() {
    const folder = document.getElementById('folderInput').value.trim();
    if (!folder) return;
    localStorage.setItem('motionIA_viewer_folder', folder);

    document.getElementById('videoCount').textContent = '…';
    const res  = await fetch('/api/videos?folder=' + encodeURIComponent(folder));
    const data = await res.json();

    if (data.error) {
      document.getElementById('videoList').innerHTML =
        `<div class="empty-msg err">${data.error}</div>`;
      document.getElementById('videoCount').textContent = '';
      return;
    }

    videos        = data.videos;
    currentFolder = data.folder;
    currentIndex  = -1;

    document.getElementById('videoCount').textContent =
      videos.length > 0 ? `${videos.length} vídeo${videos.length > 1 ? 's' : ''}` : 'nenhum vídeo';

    renderList();
    if (videos.length > 0) loadVideo(0);
  }

  // ── Render sidebar list
  function renderList() {
    const list = document.getElementById('videoList');
    if (!videos.length) {
      list.innerHTML = '<div class="empty-msg">Nenhum vídeo encontrado<br>(.mp4 .mov .webm)</div>';
      return;
    }
    list.innerHTML = videos.map((v, i) => `
      <div class="video-item ${i === currentIndex ? 'active' : ''}"
           onclick="loadVideo(${i})"
           title="${v}">
        <div class="name">${v}</div>
        <div class="meta">${i + 1} / ${videos.length}</div>
      </div>
    `).join('');
  }

  // ── Load a video by index
  async function loadVideo(index) {
    if (isDirty && currentIndex >= 0) await saveNotes(true);

    currentIndex = index;
    const filename = videos[index];

    placeholder.style.display = 'none';
    videoEl.style.display     = 'block';
    videoEl.src = `/api/video?folder=${encodeURIComponent(currentFolder)}&file=${encodeURIComponent(filename)}`;
    videoEl.play().catch(() => {});

    document.getElementById('videoNameTag').textContent = filename;
    document.getElementById('navIndex').textContent     = `${index + 1} / ${videos.length}`;
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index === videos.length - 1;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('saveBtn').disabled = false;

    renderList();
    await loadNotesForCurrent();
  }

  // ── Load saved notes for current video
  async function loadNotesForCurrent() {
    if (currentIndex < 0) return;
    const key = noteKey();
    const res  = await fetch('/api/notes?key=' + encodeURIComponent(key));
    const data = await res.json();

    document.getElementById('fieldModel').value  = data.model  || '';
    document.getElementById('fieldPrompt').value = data.prompt || '';
    document.getElementById('fieldNotes').value  = data.notes  || '';
    updateCharCount();

    isDirty = false;
    setStatus('saved', 'Salvo');
  }

  // ── Dirty tracking & auto-save
  function markDirty() {
    isDirty = true;
    setStatus('dirty', 'Não salvo');
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => saveNotes(true), 4000);
  }

  // ── Save notes
  async function saveNotes(silent = false) {
    if (currentIndex < 0) return;
    clearTimeout(autoSaveTimer);

    const btn = document.getElementById('saveBtn');
    if (!silent) { btn.textContent = '…'; btn.classList.add('ok'); }

    await fetch('/api/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key:    noteKey(),
        model:  document.getElementById('fieldModel').value,
        prompt: document.getElementById('fieldPrompt').value,
        notes:  document.getElementById('fieldNotes').value,
      })
    });

    isDirty = false;
    if (!silent) {
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = 'Salvar'; btn.classList.remove('ok'); }, 1200);
    }
    setStatus('saved', 'Salvo');
  }

  function setStatus(cls, msg) {
    const el  = document.getElementById('saveStatus');
    const txt = document.getElementById('saveMsg');
    el.className  = 'save-status ' + cls;
    txt.textContent = msg;
  }

  function noteKey() {
    return `${currentFolder}::${videos[currentIndex]}`;
  }

  function updateCharCount() {
    const len = document.getElementById('fieldPrompt').value.length;
    const el  = document.getElementById('charCount');
    el.textContent = `${len} chars`;
    el.className   = 'char-count' + (len > 2000 ? ' warn' : '');
  }

  // ── Navigate videos
  function navigate(dir) {
    const next = currentIndex + dir;
    if (next >= 0 && next < videos.length) loadVideo(next);
  }

  // ── Play / pause
  function togglePlay() {
    if (!videoEl.src) return;
    if (videoEl.paused) {
      videoEl.play();
      document.getElementById('playBtn').textContent = '⏸';
    } else {
      videoEl.pause();
      document.getElementById('playBtn').textContent = '▶';
    }
  }

  // ── Keyboard shortcuts
  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  });
</script>

</body>
</html>
